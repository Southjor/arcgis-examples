<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第1课：地图初始化</title>
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css">
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; }
        #mapContainer { width: 100vw; height: 100vh; }
        .page-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
        }
        .controls {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 10px 20px;
            border-radius: 4px;
            z-index: 100;
            display: flex;
            gap: 10px;
        }
        button {
            padding: 8px 16px;
            cursor: pointer;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
        }
        button:hover { background: #40a9ff; }
    </style>
</head>
<body>
<h1 class="page-title">ArcGIS JS 基础教程（1）：地图初始化</h1>
<div id="mapContainer"></div>
<div class="controls">
    <button id="switchSatellite">卫星图</button>
    <button id="switchVector">街道图</button>
    <button id="switchTerrain">地形图</button>
</div>

<script type="module">
    const Map = await $arcgis.import("@arcgis/core/Map.js");
    const SceneView = await $arcgis.import("@arcgis/core/views/SceneView.js");
    // 引入天地图工具类
    const getTianditu = await $arcgis.import("https://openlayers.vip/examples/resources/tianditu.js");

    // 加载影像底图
    let imgLayers = getTianditu.default({ type: "img_w" });
    let vecLayers = getTianditu.default({ type: "vec_w" });
    let terLayers = getTianditu.default({ type: "ter_w" });

    const map = new Map({
        basemap: { baseLayers: [imgLayers.base, imgLayers.anno] },
        ground: {
            surface: {
                elevationLayers: [{
                    url: "https://www.geosceneonline.cn/image/rest/services/OpenData/ChinaTerrain3D/ImageServer/"
                }]
            }
        }
    });

    const view = new SceneView({
        container: "mapContainer",
        map: map,
        center: [116.4074, 39.9042],
        zoom: 12,
        tilt: 45
    });

    view.when(() => console.log("三维地图加载完成！"));

    // 底图切换功能
    document.getElementById("switchSatellite").onclick = () => {
        map.basemap = { baseLayers: [imgLayers.base, imgLayers.anno] };
    };
    document.getElementById("switchVector").onclick = () => {
        map.basemap = { baseLayers: [vecLayers.base, vecLayers.anno] };
    };
    document.getElementById("switchTerrain").onclick = () => {
        map.basemap = { baseLayers: [terLayers.base, terLayers.anno] };
    };
</script>
</body>
</html>
