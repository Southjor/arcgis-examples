<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第6课：地图弹窗信息窗口</title>
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css">
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; }
        #mapContainer { width: 100vw; height: 100vh; }
        .page-title {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            background: rgba(255,255,255,0.95); padding: 10px 24px; border-radius: 6px;
            font-size: 18px; font-weight: bold; z-index: 100;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
    </style>
</head>
<body>
<h1 class="page-title">第6课：地图弹窗信息窗口</h1>
<div id="mapContainer"></div>

<script type="module">
    const Map = await $arcgis.import("@arcgis/core/Map.js");
    const SceneView = await $arcgis.import("@arcgis/core/views/SceneView.js");
    const Graphic = await $arcgis.import("@arcgis/core/Graphic.js");
    const GraphicsLayer = await $arcgis.import("@arcgis/core/layers/GraphicsLayer.js");
    const getTianditu = await $arcgis.import("https://openlayers.vip/examples/resources/tianditu.js");

    // 获取天地图底图
    const vecLayers = getTianditu.default({ type: "vec_w" });

    // 创建地图
    const map = new Map({
        basemap: { baseLayers: [vecLayers.base, vecLayers.anno] }
    });

    // 创建SceneView（3D视图）
    const view = new SceneView({
        container: "mapContainer",
        map: map,
        viewingMode: "global",
        camera: {
            position: {
                longitude: 116.4074,
                latitude: 39.9042,
                z: 1500
            },
            tilt: 45,
            heading: 0
        },
        popup: {
            dockEnabled: true,
            dockOptions: {
                position: "bottom-left",
                buttonEnabled: false,
                collapseEnabled: false
            }
        }
    });

    // 创建GraphicsLayer存储要素
    const graphicsLayer = new GraphicsLayer();
    map.add(graphicsLayer);

    // 示例数据：北京主要地标
    const landmarks = [
        {
            name: "故宫博物院",
            type: "景区",
            level: "5A级",
            address: "北京市东城区景山前街4号",
            coords: [116.3975, 39.9182]
        },
        {
            name: "天安门广场",
            type: "广场",
            level: "国家级",
            address: "北京市东城区东长安街",
            coords: [116.3975, 39.9042]
        },
        {
            name: "国家大剧院",
            type: "文化设施",
            level: "特级",
            address: "北京市西城区西长安街2号",
            coords: [116.3917, 39.9045]
        },
        {
            name: "北京站",
            type: "交通枢纽",
            level: "特等站",
            address: "北京市东城区建国门内大街甲13号",
            coords: [116.4274, 39.9046]
        },
        {
            name: "三里屯太古里",
            type: "商业区",
            level: "市级",
            address: "北京市朝阳区三里屯路19号",
            coords: [116.4495, 39.9385]
        },
        {
            name: "中关村",
            type: "科技园区",
            level: "国家级",
            address: "北京市海淀区中关村大街",
            coords: [116.3126, 39.9831]
        }
    ];

    // 创建弹窗模板
    const createPopupTemplate = (name, type, level, address) => ({
        title: name,
        content: [
            {
                type: "fields",
                fieldInfos: [
                    {
                        fieldName: "type",
                        label: "类型",
                        visible: true,
                        format: { digitSeparator: false }
                    },
                    {
                        fieldName: "level",
                        label: "等级",
                        visible: true
                    },
                    {
                        fieldName: "address",
                        label: "地址",
                        visible: true
                    }
                ]
            }
        ]
    });

    // 添加标注
    landmarks.forEach((landmark, index) => {
        const graphic = new Graphic({
            geometry: {
                type: "point",
                longitude: landmark.coords[0],
                latitude: landmark.coords[1]
            },
            symbol: {
                type: "simple-marker",
                color: [230, 76, 60, 0.9],
                outline: {
                    color: [255, 255, 255, 0.5],
                    width: 1
                },
                size: index < 3 ? 12 : 10
            },
            attributes: {
                name: landmark.name,
                type: landmark.type,
                level: landmark.level,
                address: landmark.address
            },
            popupTemplate: createPopupTemplate(
                landmark.name,
                landmark.type,
                landmark.level,
                landmark.address
            )
        });
        graphicsLayer.add(graphic);
    });

    // 默认弹出第一个点的信息
    view.when(() => {
        view.popup.open({
            location: { longitude: 116.3975, latitude: 39.9182 },
            title: landmarks[0].name,
            content: `类型：${landmarks[0].type}<br>等级：${landmarks[0].level}<br>地址：${landmarks[0].address}`
        });

        console.log("地图弹窗信息窗口示例加载完成！");
    });
</script>
</body>
</html>
