<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第2课：ArcGIS JS 5.0 地图切换底图（含自定义底图）</title>
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css">
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; }
        #mapContainer { width: 100vw; height: 100vh; }
        .page-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
        }
        /* 底图切换按钮容器 */
        .basemap-buttons {
            position: absolute;
            top: 70px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 100;
        }
        .basemap-btn {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .basemap-btn:hover { transform: scale(1.05); }
        .btn-img { background: #2563eb; color: white; }
        .btn-vec { background: #16a34a; color: white; }
        .btn-ter { background: #ea580c; color: white; }
        .btn-active { box-shadow: 0 0 0 3px rgba(0,0,0,0.3); }
    </style>
</head>
<body>
<h1 class="page-title">ArcGIS JS 5.0 底图切换示例</h1>
<div id="mapContainer"></div>

<!-- 底图切换按钮 -->
<div class="basemap-buttons">
    <button class="basemap-btn btn-img btn-active" id="btnImg">影像底图</button>
    <button class="basemap-btn btn-vec" id="btnVec">矢量底图</button>
    <button class="basemap-btn btn-ter" id="btnTer">地形底图</button>
</div>

<script type="module">
    const Map = await $arcgis.import("@arcgis/core/Map.js");
    const SceneView = await $arcgis.import("@arcgis/core/views/SceneView.js");
    const getTianditu = await $arcgis.import("https://openlayers.vip/examples/resources/tianditu.js");

    // 加载三种天地图底图
    const imgLayers = getTianditu.default({ type: "img_w" }); // 影像
    const vecLayers = getTianditu.default({ type: "vec_w" }); // 矢量
    const terLayers = getTianditu.default({ type: "ter_w" }); // 地形

    // 初始化地图（默认影像底图）
    const map = new Map({
        basemap: { baseLayers: [imgLayers.base, imgLayers.anno] },
        ground: {
            surface: {
                elevationLayers: [{
                    url: "https://www.geosceneonline.cn/image/rest/services/OpenData/ChinaTerrain3D/ImageServer/"
                }]
            }
        }
    });

    const view = new SceneView({
        container: "mapContainer",
        map: map,
        center: [118.805, 34.027],
        zoom: 13,
        tilt: 45
    });

    // 底图切换功能
    function switchBasemap(layers, btnId) {
        map.basemap = { baseLayers: [layers.base, layers.anno] };
        // 更新按钮状态
        document.querySelectorAll('.basemap-btn').forEach(btn => btn.classList.remove('btn-active'));
        document.getElementById(btnId).classList.add('btn-active');
    }

    // 绑定按钮事件
    document.getElementById("btnImg").onclick = () => switchBasemap(imgLayers, "btnImg");
    document.getElementById("btnVec").onclick = () => switchBasemap(vecLayers, "btnVec");
    document.getElementById("btnTer").onclick = () => switchBasemap(terLayers, "btnTer");

    view.when(() => console.log("三维地图加载完成，可点击右上角按钮切换底图！"));
</script>
</body>
</html>
