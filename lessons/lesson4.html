<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第4课：地图中心点定位（指定经纬度/地址）</title>
    <link rel="stylesheet" href="https://js.arcgis.com/5.0/esri/themes/light/main.css">
    <script type="module" src="https://js.arcgis.com/5.0/"></script>
    <style>
        body { margin: 0; padding: 0; font-family: "Microsoft YaHei", sans-serif; }
        #mapContainer { width: 100vw; height: 100vh; }
        .page-title {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255,255,255,0.9);
            padding: 8px 20px;
            border-radius: 4px;
            font-size: 18px;
            font-weight: bold;
            z-index: 100;
        }
        .control-panel {
            position: absolute;
            top: 70px;
            left: 20px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            z-index: 100;
        }
        .control-panel button {
            margin: 5px;
            padding: 8px 15px;
            border: 1px solid #1890ff;
            background: white;
            color: #1890ff;
            border-radius: 4px;
            cursor: pointer;
        }
        .control-panel button:hover {
            background: #1890ff;
            color: white;
        }
        .coord-input {
            margin: 10px 0;
        }
        .coord-input input {
            width: 120px;
            padding: 5px;
            margin: 0 5px;
            border: 1px solid #d9d9d9;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <h1 class="page-title">第4课：地图中心点定位（指定经纬度/地址）</h1>
    
    <div class="control-panel">
        <div>
            <button onclick="locateBeijing()">定位到北京</button>
            <button onclick="locateShanghai()">定位到上海</button>
            <button onclick="locateGuangzhou()">定位到广州</button>
        </div>
        
        <div class="coord-input">
            <br>
            <label>经度: <input type="number" id="lngInput" value="116.4074" step="0.0001"></label>
            <label>纬度: <input type="number" id="latInput" value="39.9042" step="0.0001"></label>
            <button onclick="locateByInput()">定位到输入坐标</button>
        </div>
        
        <div>
            <br>
            <button onclick="locateByAddress()">地址定位（天安门）</button>
        </div>
    </div>
    
    <div id="mapContainer"></div>

    <script type="module">
        const Map = await $arcgis.import("@arcgis/core/Map.js");
        const SceneView = await $arcgis.import("@arcgis/core/views/SceneView.js");
        const getTianditu = await $arcgis.import("https://openlayers.vip/examples/resources/tianditu.js");

        // 加载影像底图
        const imgLayers = getTianditu.default({ type: "img_w" });

        const map = new Map({
            basemap: { baseLayers: [imgLayers.base, imgLayers.anno] },
            ground: {
                surface: {
                    elevationLayers: [{
                        url: "https://www.geosceneonline.cn/image/rest/services/OpenData/ChinaTerrain3D/ImageServer/"
                    }]
                }
            }
        });

        const view = new SceneView({
            container: "mapContainer",
            map: map,
            center: [118.805, 34.027],
            zoom: 13,
            tilt: 45
        });

        view.when(() => {
            console.log("三维地图加载完成！");
            
            // 添加点标记函数
            window.addPointMarker = (longitude, latitude, title) => {
                const Point = $arcgis.import("@arcgis/core/geometry/Point.js");
                const Graphic = $arcgis.import("@arcgis/core/Graphic.js");
                const SimpleMarkerSymbol = $arcgis.import("@arcgis/core/symbols/SimpleMarkerSymbol.js");
                
                const point = new Point({
                    longitude: longitude,
                    latitude: latitude
                });
                
                const markerSymbol = new SimpleMarkerSymbol({
                    color: [255, 0, 0],
                    size: 12
                });
                
                const pointGraphic = new Graphic({
                    geometry: point,
                    symbol: markerSymbol,
                    attributes: {
                        title: title
                    }
                });
                
                view.graphics.add(pointGraphic);
            };
        });

        // 1. 定位到北京
        window.locateBeijing = () => {
            view.goTo({
                center: [116.4074, 39.9042],
                zoom: 12,
                animate: true
            }).then(() => {
                console.log("已定位到北京");
            });
        };

        // 2. 定位到上海
        window.locateShanghai = () => {
            view.goTo({
                center: [121.4737, 31.2304],
                zoom: 12,
                animate: true
            }).then(() => {
                console.log("已定位到上海");
            });
        };

        // 3. 定位到广州
        window.locateGuangzhou = () => {
            view.goTo({
                center: [113.2644, 23.1291],
                zoom: 12,
                animate: true
            }).then(() => {
                console.log("已定位到广州");
            });
        };

        // 4. 根据输入框的坐标定位
        window.locateByInput = () => {
            const lng = parseFloat(document.getElementById("lngInput").value);
            const lat = parseFloat(document.getElementById("latInput").value);
            
            if (isNaN(lng) || isNaN(lat)) {
                alert("请输入有效的经纬度！");
                return;
            }
            
            view.goTo({
                center: [lng, lat],
                zoom: 14,
                animate: true
            }).then(() => {
                console.log(`已定位到经纬度: ${lng}, ${lat}`);
            });
        };

        // 5. 地址定位（使用地理编码服务）
        window.locateByAddress = () => {
            const locatorUrl = "https://geocode.arcgis.com/arcgis/rest/services/World/GeocodeServer";
            
            const Locator = $arcgis.import("@arcgis/core/tasks/Locator.js");
            const locator = new Locator({ url: locatorUrl });
            
            locator.addressToLocations({
                address: {
                    "Address": "北京市天安门广场"
                },
                outFields: ["*"]
            }).then((results) => {
                if (results.length > 0) {
                    const location = results[0].location;
                    view.goTo({
                        center: [location.longitude, location.latitude],
                        zoom: 15,
                        animate: true
                    }).then(() => {
                        console.log("已定位到地址：北京市天安门广场");
                        alert(`定位成功！\n地址：${results[0].address}\n经度：${location.longitude}\n纬度：${location.latitude}`);
                    });
                } else {
                    alert("未找到该地址！");
                }
            }).catch((error) => {
                console.error("地址解析失败：", error);
                alert("地址解析失败，请检查网络连接或地址格式！");
            });
        };
    </script>
</body>
</html>
